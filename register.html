<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>µLearn GECK – Event Registration</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav>
    <a class="nav-brand" href="index.html#home">µLearn <span>GECK</span></a>
    <ul class="nav-links">
      <li><a href="index.html#home">Home</a></li>
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#events">Events</a></li>
      <li><a href="index.html#achievements">Achievements</a></li>
      <li><a href="index.html#team">Team</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
    <a class="nav-cta" href="https://mulearn.org" target="_blank">Join MuLearn</a>
  </nav>

  <div class="register-body-wrapper" style="margin-top: 80px; min-height: calc(100vh - 80px); width: 100%; display: flex; justify-content: center; align-items: center; padding: 40px 20px;">
    
    <div class="form-container" style="background: rgba(26, 0, 48, 0.65); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
      <h2 id="form-title" style="margin-bottom: 25px;">Student Details Form</h2>
      
      <form id="studentRegisterForm">
        <input type="hidden" id="eventName" name="eventName">
        <input type="hidden" id="eventCategory" name="eventCategory">
          
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="ENTER YOUR NAME" required>
        </div>

        <div class="form-group">
          <label for="muid">MUID</label>
          <input type="text" id="muid" name="muid" placeholder="ENTER YOUR MUID" required>
        </div>

        <div class="form-group">
          <label for="semester">Semester</label>
          <select id="semester" name="semester" required>
            <option value="" disabled selected>Select your semester</option>
            <option value="S1">S1</option>
            <option value="S2">S2</option>
            <option value="S3">S3</option>
            <option value="S4">S4</option>
            <option value="S5">S5</option>
            <option value="S6">S6</option>
            <option value="S7">S7</option>
            <option value="S8">S8</option>
          </select>
        </div>

        <div class="form-group">
          <label for="department">Department</label>
          <select id="department" name="department" required>
            <option value="" disabled selected>Select your department</option>
            <option value="CSD">CSD</option>
            <option value="EC">EC</option>
            <option value="AE">AE</option>
            <option value="CE">CE</option>
            <option value="MECH">MECH</option>
          </select>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="name@example.com" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="1234567890" pattern="[0-9]{10}" title="Please enter a valid 10-digit phone number" required>
        </div>

        <button type="submit" id="submitBtn">Submit Registration</button>
      </form>
      
      <p id="successToast" style="color: #00e676; text-align: center; margin-top: 15px; display: none; font-weight: 600; font-family: 'Space Mono', monospace; font-size: 0.85rem;">
        Registration saved to database matrix!
      </p>
    </div>

  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const eventName = urlParams.get('name') || "Event";
    const eventCategory = urlParams.get('cat') || "Tech"; 

    document.getElementById('form-title').innerText = `Register for ${decodeURIComponent(eventName)}`;
    document.getElementById('eventName').value = decodeURIComponent(eventName);
    document.getElementById('eventCategory').value = decodeURIComponent(eventCategory);

    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbz1YLQO2w8bwQ8GNweSL10hmGk7LfmsLa-3VW8U76nuwHiRft1mTZz8T8WTAPWBjPbb/exec'; 
    
    const form = document.getElementById('studentRegisterForm');
    const submitBtn = document.getElementById('submitBtn');
    const toast = document.getElementById('successToast');

    form.addEventListener('submit', event => {
      event.preventDefault(); 
      
      submitBtn.disabled = true;
      submitBtn.innerText = "Processing submission...";
      submitBtn.style.opacity = "0.6";

      const encodedPayload = new URLSearchParams(new FormData(form));

      fetch(BACKEND_URL, { 
        method: 'POST', 
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: encodedPayload 
      })
      .then(() => {
        submitBtn.innerText = "Submitted Successfully!";
        toast.style.display = "block";
        form.reset(); 
        
        document.getElementById('eventName').value = decodeURIComponent(eventName);
        document.getElementById('eventCategory').value = decodeURIComponent(eventCategory);

        setTimeout(() => {
          window.location.href = "index.html#events";
        }, 2000);
      })
      .catch(err => {
        console.error("Error logging submission:", err.message);
        submitBtn.disabled = false;
        submitBtn.style.opacity = "1";
        submitBtn.innerText = "Retry Submission";
      });
    });
  </script>
</body>
</html>
